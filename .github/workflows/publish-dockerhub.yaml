# Pushes two images to one Docker Hub repository using tag prefixes:
#   dylansea/1panel-ssl-from-asus-router:router-<version>, :router-latest
#   dylansea/1panel-ssl-from-asus-router:1panel-<version>, :1panel-latest
#
# Triggers: manual (workflow_dispatch with version) or git tag push v* (e.g. v1.2.3).
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Publish Docker Hub

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0), without v prefix"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.router
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: BUILD_FROM=alpine:3.20
          tags: |
            dylansea/1panel-ssl-from-asus-router:router-${{ steps.ver.outputs.version }}
            dylansea/1panel-ssl-from-asus-router:router-latest

      - name: Push 1Panel image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.1panel
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: BUILD_FROM=alpine:3.20
          tags: |
            dylansea/1panel-ssl-from-asus-router:1panel-${{ steps.ver.outputs.version }}
            dylansea/1panel-ssl-from-asus-router:1panel-latest
